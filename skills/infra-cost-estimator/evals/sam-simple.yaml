AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Simple serverless stack for infra-cost-estimator evaluation.
  3 Lambda functions, REST API, DynamoDB with GSI, SQS, Secrets Manager, EventBridge schedule.

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    MemorySize: 512
    Timeout: 10

Resources:

  # ── API ──────────────────────────────────────────────
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod

  # ── Lambda Functions ─────────────────────────────────
  ProcessOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/processOrder.handler
      Description: API-triggered — processes incoming orders
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt NotificationQueue.QueueName
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref AppSecret
      Events:
        PostOrder:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /orders
            Method: POST

  NotificationWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/notificationWorker.handler
      Description: SQS-triggered — sends notifications
      MemorySize: 256
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt NotificationQueue.Arn
            BatchSize: 10

  DailyReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/dailyReport.handler
      Description: Scheduled — generates daily summary report
      MemorySize: 256
      Timeout: 30
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable

  # ── DynamoDB ─────────────────────────────────────────
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CustomerIndex
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── SQS ──────────────────────────────────────────────
  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-notifications
      VisibilityTimeout: 60

  # ── Secrets Manager ──────────────────────────────────
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/api-key
      Description: Third-party API key for order processing

  # ── EventBridge Schedule ─────────────────────────────
  DailyReportSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      ScheduleExpression: cron(0 8 * * ? *)
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !GetAtt DailyReportFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt DailyReportFunction.Arn

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod/
  OrdersTableName:
    Description: DynamoDB table name
    Value: !Ref OrdersTable
